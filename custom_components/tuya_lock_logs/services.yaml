refresh:
  name: Refresh lock records
  description: >-
    Force a Tuya query for open records, optionally after a delay. Useful
    when called from an automation triggered by a door or presence sensor.
  fields:
    delay:
      name: Delay
      description: >-
        Seconds to wait before querying Tuya. If omitted, the value
        configured in the integration options is used.
      example: 5
      selector:
        number:
          min: 0
          max: 120
          unit_of_measurement: s
    entry_id:
      name: Entry
      description: >-
        Configuration entry ID to refresh. If omitted, all locks configured
        with this integration are refreshed.
      selector:
        text:
